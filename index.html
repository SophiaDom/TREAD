<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <title>Tread</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tread" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />



</head>

<body>
  <div id="swipeArea">

    <!-- ENTRANCE PANEL (now first/left panel) -->
    <div id="entrance" class="panel">
      <!-- Gradient backdrop for entrance panel only -->
      <canvas id="gradient-canvas"></canvas>
      <div class="gradient-wash"></div>
      
      <img id="tread-title" src="tread-title.png" alt="Tread">
      <div id="beginSlider" class="vertical-slider">
        <div class="track"></div>
        <div class="thumb"></div>
      </div>

      <!-- START OVERLAY (slides up over entrance) -->
      <div id="start">
        <canvas id="quiz-gradient-canvas"></canvas>
        <div class="gradient-wash" style="position:absolute;inset:0;z-index:1;pointer-events:none;"></div>
        <div id="quiz">

          <section class="qstep active" data-step="1">
            <h2>How much time do you have?</h2>

            <div class="sliderRow">
              <input id="timeSlider" type="range" min="10" max="120" step="5" value="55" />
              <div id="timeValue">55 minutes</div>
            </div>

            <button class="nextBtn">Next</button>
          </section>

          <section class="qstep" data-step="2">
            <h2>What's your current mood?</h2>

            <div class="choices" data-name="q2_mood">
              <label class="choice">
                <input type="radio" name="q2_mood" value="isolated" />
                <span>Isolated</span>
              </label>

              <label class="choice">
                <input type="radio" name="q2_mood" value="curious" />
                <span>Curious</span>
              </label>

              <label class="choice">
                <input type="radio" name="q2_mood" value="bored" />
                <span>Bored</span>
              </label>
            </div>
          </section>

          <section class="qstep" data-step="3">
            <h2>Are you seeking connection or reflection?</h2>

            <div class="choices" data-name="q3_intent">
              <label class="choice">
                <input type="radio" name="q3_intent" value="connection" />
                <span>Connection</span>
              </label>

              <label class="choice">
                <input type="radio" name="q3_intent" value="reflection" />
                <span>Reflection</span>
              </label>
            </div>
          </section>

          <section class="qstep" data-step="4">
            <h2>Do you feel like responding or noticing?</h2>

            <div class="choices" data-name="q4_view">
              <label class="choice">
                <input type="radio" name="q4_view" value="responding" />
                <span>Responding</span>
              </label>

              <label class="choice">
                <input type="radio" name="q4_view" value="noticing" />
                <span>Noticing</span>
              </label>
            </div>
          </section>

          <section class="qstep" data-step="5">
            <h2>Ready to TREAD?</h2>
            <div class="calculateSlider vertical-slider">
              <div class="track"></div>
              <div class="thumb"></div>
            </div>
          </section>

        </div>

        <div id="startMap" hidden></div>

      </div>
    </div>

    <!-- RIGHT PANEL (now correctly a sibling) -->
    <div id="journal" class="panel">
      <h2>JOURNAL</h2>

      <div id="entries" style="
        position:absolute;top:14vh;bottom:12vh;left:0;right:0;
        overflow-y:auto;padding:16px;box-sizing:border-box;
      "></div>

      <button id="startNewBtn">+</button>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/gradient.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/script.js"></script>
  <script src="js/collage.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("SW registered"))
        .catch((e) => console.warn("SW failed:", e));
    }
  </script>
</body>
</html>
