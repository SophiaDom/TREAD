<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <title>Tread</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Tread" />
</head>

<body>
  <div id="swipeArea">

    <!-- ENTRANCE PANEL (now first/left panel) -->
    <div id="entrance" class="panel">
      <!-- Gradient backdrop for entrance panel only -->
      <canvas id="gradient-canvas"></canvas>
      <div class="gradient-wash"></div>
      
      <img id="tread-title" src="tread-title.png" alt="Tread">
      <div id="beginSlider" class="vertical-slider">
        <div class="track"></div>
        <div class="thumb"></div>
      </div>

      <!-- START OVERLAY (slides up over entrance) -->
      <div id="start">
        <canvas id="quiz-gradient-canvas"></canvas>
        <div class="gradient-wash" style="position:absolute;inset:0;z-index:1;pointer-events:none;"></div>
        <div id="quiz">

          <!-- STEP 1 -->
          <div class="qstep active">
            <h2>HOW LONG DO YOU WANT TO WALK FOR?</h2>
            <div class="sliderRow">
              <input type="range" id="timeSlider" min="10" max="120" step="5" value="55" />
              <div id="timeValue">55 minutes</div>
            </div>
            <button class="nextBtn">NEXT</button>
          </div>

          <!-- STEP 2 -->
          <div class="qstep">
            <h2>HOW DO YOU FEEL TODAY?</h2>
            <div class="choices">
              <label class="choice">
                <input type="radio" name="q2_mood" value="isolated" />
                <span>ISOLATED</span>
              </label>
              <label class="choice">
                <input type="radio" name="q2_mood" value="curious" />
                <span>CURIOUS</span>
              </label>
              <label class="choice">
                <input type="radio" name="q2_mood" value="bored" />
                <span>BORED</span>
              </label>
            </div>
            <button class="nextBtn">NEXT</button>
          </div>

          <!-- STEP 3 -->
          <div class="qstep">
            <h2>WHAT ARE YOU HOPING TO GET OUT OF THIS WALK?</h2>
            <div class="choices">
              <label class="choice">
                <input type="radio" name="q3_intent" value="connection" />
                <span>CONNECTION TO THE WORLD AROUND ME</span>
              </label>
              <label class="choice">
                <input type="radio" name="q3_intent" value="reflection" />
                <span>REFLECTION ON MYSELF AND MY LIFE</span>
              </label>
            </div>
            <button class="nextBtn">NEXT</button>
          </div>

          <!-- STEP 4 -->
          <div class="qstep">
            <h2>WHICH OF THESE FEELS RIGHT TODAY?</h2>
            <div class="choices">
              <label class="choice">
                <input type="radio" name="q4_view" value="responding" />
                <span>I WANT TO RESPOND TO THE WORLD</span>
              </label>
              <label class="choice">
                <input type="radio" name="q4_view" value="noticing" />
                <span>I WANT TO NOTICE THE WORLD</span>
              </label>
            </div>
            <button class="nextBtn">NEXT</button>
          </div>

          <!-- STEP 5 / FINAL -->
          <div class="qstep">
            <h2>CALCULATING YOUR ROUTE...</h2>
            <div class="calculateSlider">
              <div class="track"></div>
              <div class="thumb"></div>
            </div>
          </div>

        </div>
        <div id="startMap" hidden></div>
      </div>
    </div>

    <!-- RIGHT PANEL (now correctly a sibling) -->
    <div id="journal" class="panel">
      <h2>JOURNAL</h2>

      <div id="entries" style="
        position:absolute;top:14vh;bottom:12vh;left:0;right:0;
        overflow-y:auto;padding:16px;box-sizing:border-box;
      "></div>

      <button id="startNewBtn">+</button>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/gradient.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/script.js"></script>
  <script src="js/collage.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("SW registered"))
        .catch((e) => console.warn("SW failed:", e));
    }
  </script>
</body>
</html>
